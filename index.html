<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Hawaii Countdown</title><style>body{margin:0;font-family:Arial;background:linear-gradient(#48c6ef,#0b8795);color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}#c{font-size:2.2rem;font-weight:bold}</style></head><body><div><h1>🌺 Hawaii Family Countdown 🌺</h1><div id='c'></div><p>David • Desiree • Mom</p><p>August 8, 2026</p></div><script>const t=new Date('2026-08-08T00:00:00-07:00').getTime();function u(){let d=t-Date.now();if(d<=0){document.getElementById('c').innerHTML='Aloha!';return;}let days=Math.floor(d/86400000),h=Math.floor(d/3600000)%24,m=Math.floor(d/60000)%60,s=Math.floor(d/1000)%60;document.getElementById('c').innerHTML=days+' Days<br>'+h+' Hours '+m+' Minutes '+s+' Seconds';}u();setInterval(u,1000);</script></body></html>
